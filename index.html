<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
}

textarea, select, button {
    width: 100%;
    font-size: 16px;
    padding: 10px;
    margin-top: 10px;
}

#qr-wrapper {
    margin-top: 20px;
    display: inline-block;
    background: white;
    padding: 24px; /* quiet zone */
}
</style>
</head>

<body>

<h2>QR Generator</h2>

<textarea id="textInput" placeholder="Paste text or URL"></textarea>

<select id="sizeSelect">
    <option value="256">256 px (screen)</option>
    <option value="512">512 px (print)</option>
    <option value="1024">1024 px (sticker / poster)</option>
</select>

<button onclick="downloadQR()">Download PNG</button>

<div id="qr-wrapper">
    <div id="qrcode"></div>
</div>

<script>

const input = document.getElementById("textInput");
const container = document.getElementById("qrcode");
const sizeSelect = document.getElementById("sizeSelect");

let qr;

function generateQR() {

    const value = input.value.trim();
    const size = parseInt(sizeSelect.value);

    container.innerHTML = "";

    if (!value) return;

    qr = new QRCode(container, {
        text: unescape(encodeURIComponent(value)),
        width: size,
        height: size,
        correctLevel: QRCode.CorrectLevel.H
    });
}

input.addEventListener("input", generateQR);
sizeSelect.addEventListener("change", generateQR);

function downloadQR() {

    const canvas = container.querySelector("canvas");

    if (!canvas) {
        alert("Generate a QR first");
        return;
    }

    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "qrcode.png";
    link.click();
}

</script>

</body>
</html>
