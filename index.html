<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>QR Code Generator</title>

<script src="qrcode.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
    background-color: #121212; /* Dark background */
    color: #e0e0e0; /* Light text */
}

textarea {
    width: 100%;
    height: 100px;
    font-size: 16px;
    padding: 10px;
    box-sizing: border-box;
    background-color: #1e1e1e;
    color: #ffffff;
    border: 1px solid #333;
    border-radius: 4px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    cursor: pointer;
    background-color: #333;
    color: white;
    border: 1px solid #444;
    border-radius: 4px;
}

button:active {
    background-color: #444;
}

#qr-wrapper {
    margin-top: 20px;
    display: inline-block;
    background: white; /* Keeps the QR code scannable */
    padding: 24px; 
    border-radius: 12px;
}

#qrcode canvas,
#qrcode img {
    display: block;
}
</style>
</head>

<body>

<h2>QR Generator</h2>

<textarea id="textInput" placeholder="Paste text or URL"></textarea>
<button onclick="downloadQR()">Download PNG</button>

<div id="qr-wrapper">
    <div id="qrcode"></div>
</div>

<script>

const input = document.getElementById("textInput");
const container = document.getElementById("qrcode");

let qr;
input.focus();
function generateQR() {

    const value = input.value.trim();
    container.innerHTML = "";

    if (!value) return;

    const qr = qrcode(0, 'H');
    qr.addData(value);
    qr.make();

    container.innerHTML = qr.createImgTag(6, 4);
}

input.addEventListener("input", generateQR);

function downloadQR() {

    const canvas = container.querySelector("canvas");

    if (!canvas) {
        alert("Generate a QR first");
        return;
    }

    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "qrcode.png";
    link.click();
}

generateQR();

</script>

</body>
</html>
